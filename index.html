<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gage Burd – Dashboard</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 32px;
      background: #ffffff;
      border-bottom: 1px solid #e2e6ea;
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a2e;
    }

    .layout {
      display: flex;
      flex: 1;
    }

    nav {
      width: 200px;
      background: #ffffff;
      border-right: 1px solid #e2e6ea;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 40px 0;
    }

    nav a {
      display: block;
      text-align: center;
      padding: 16px;
      font-size: 1rem;
      font-weight: 500;
      color: #1a1a2e;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    nav a:hover {
      background: #f0f2f5;
    }

    nav a.active {
      color: #0066cc;
      font-weight: 600;
    }

    main {
      flex: 1;
      padding: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gage Burd</h1>
  </header>
  <div class="layout">
    <nav>
      <a href="#" class="active">Profile</a>
      <a href="#">Commercial</a>
      <a href="#">Residential</a>
    </nav>
    <main></main>
  </div>
</body>
</html>
