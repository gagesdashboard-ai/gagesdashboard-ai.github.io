<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gage Burd – Dashboard</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 28px 40px;
      background: #000000;
      border-bottom: 1px solid #333;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
    }

    .logo {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      height: 64px;
      width: 64px;
    }

    .layout {
      display: flex;
      flex: 1;
    }

    nav {
      width: 200px;
      background: #111111;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 40px 0;
    }

    nav a {
      display: block;
      text-align: center;
      padding: 16px;
      font-size: 1rem;
      font-weight: 500;
      color: #cccccc;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    nav a:hover {
      background: #222222;
      color: #ffffff;
    }

    nav a.active {
      color: #ffffff;
      font-weight: 600;
      border-left: 3px solid #ffffff;
    }

    main {
      flex: 1;
      padding: 40px;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gage Burd</h1>
    <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Diamond outline -->
      <rect x="20" y="20" width="160" height="160" rx="2" fill="white" stroke="#555" stroke-width="3" transform="rotate(45 100 100)"/>
      <!-- S -->
      <text x="52" y="115" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#1a8fa0">S</text>
      <!-- G -->
      <text x="88" y="120" font-family="Georgia, serif" font-size="92" font-weight="700" fill="#1a8fa0">G</text>
      <!-- SHEPHERD GROUP -->
      <text x="100" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#555" text-anchor="middle" letter-spacing="2">SHEPHERD GROUP</text>
    </svg>
  </header>
  <div class="layout">
    <nav>
      <a href="#" class="active">Profile</a>
      <a href="#">Commercial</a>
      <a href="#">Residential</a>
    </nav>
    <main></main>
  </div>
</body>
</html>
