<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gage Burd – Dashboard</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: center; position: relative; padding: 28px 40px; background: #000000; border-bottom: 1px solid #222; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.5px; color: #ffffff; }
    .logo { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); height: 72px; width: auto; }
    .layout { display: flex; flex: 1; }
    nav { width: 200px; background: #000000; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: space-evenly; padding: 40px 0; }
    nav a { display: block; text-align: center; padding: 16px; font-size: 1rem; font-weight: 500; color: #aaaaaa; text-decoration: none; cursor: pointer; transition: color 0.15s; }
    nav a:hover { color: #ffffff; }
    nav a.active { color: #ffffff; font-weight: 600; }
    main { flex: 1; padding: 40px; background: #000000; }
  </style>
</head>
<body>
  <header>
    <h1>Gage Burd</h1>
    <img class="logo" src="https://www.shepherdgroupre.com/wp-content/uploads/sites/2492/2025/07/Logo-with-bottom-padding.png" alt="Shepherd Group" />
  </header>
  <div class="layout">
    <nav>
      <a href="#" class="active">Profile</a>
      <a href="#">Commercial</a>
      <a href="#">Residential</a>
    </nav>
    <main></main>
  </div>
</body>
</html>
